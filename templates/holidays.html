<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>วันหยุดนักขัตฤกษ์</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Sarabun','sans-serif']}}}}</script>
  <style>body{font-family:'Sarabun',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/" class="text-gray-400 hover:text-gray-600 text-xl">←</a>
      <h1 class="text-lg font-bold text-gray-900">🎌 วันหยุดนักขัตฤกษ์</h1>
    </div>
  </header>

  <div class="max-w-lg mx-auto px-4 py-6 space-y-5">

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <h2 class="font-bold text-gray-800 mb-3">เพิ่มวันหยุด</h2>
      <form method="post" action="/holidays" class="space-y-3">
        <div class="flex gap-2">
          <input type="date" name="date" required class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white"/>
          <input type="text" name="name" placeholder="ชื่อวันหยุด" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition-colors">+ เพิ่มวันหยุด</button>
      </form>
    </div>

    <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-800">
      💡 วันหยุดที่เพิ่มไว้ ระบบจะไม่ส่ง reminder ในวันนั้น
    </div>

    {% if holidays %}
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 divide-y divide-gray-100">
      {% for h in holidays %}
      <div class="flex items-center justify-between px-4 py-3">
        <div>
          <span class="font-medium text-gray-800">{{ h.date }}</span>
          {% if h.name %}<span class="text-gray-500 text-sm ml-2">{{ h.name }}</span>{% endif %}
        </div>
        <form method="post" action="/holidays/{{ h.id }}/delete" onsubmit="return confirm('ลบวันหยุดนี้?')">
          <button class="text-gray-300 hover:text-red-400 transition-colors">✕</button>
        </form>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div class="text-center text-gray-400 py-8">
      <div class="text-4xl mb-2">📅</div>
      <p class="text-sm">ยังไม่มีวันหยุดที่เพิ่มไว้</p>
    </div>
    {% endif %}

  </div>
</body>
</html>
